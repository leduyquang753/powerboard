<!DOCTYPE html>
<html>
<head>
	<meta charset=utf-8>
	<title>PowerBoard</title>
	<meta name=viewport content="width=device-width, initial-scale=1">
	<link rel=stylesheet href="src/styles.css">
</head>
<body style="margin: 0; overflow: hidden;">
	<div class=canvas id=backgroundCanvas></div>
	<div class=canvas id=mainCanvas></div>
	<div class=controls>
		<div class="controlGroup visibleControlGroup" id=modeSelector>
			<div>Draw</div>
			<div>Erase</div>
			<div>Pan</div>
		</div>
		<div class=controlGroup id=drawOptions>
			<div>Color: #000000</div>
			<div>Size: 5</div>
		</div>
		<div class=controlGroup id=eraseOptions>
			<div>Mode: partial</div>
			<div>Size: 20</div>
		</div>
		<div class=controlGroup id=panOptions>
			<div>Reset</div>
		</div>
	</div>
	<script type=module src="src/main.js"></script>
</body>
</html>

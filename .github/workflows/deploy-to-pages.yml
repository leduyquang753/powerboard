{
	"on": {
		"push": {"branches": ["main"]},
		"workflow_dispatch": {}
	},
	"permissions": {
		"contents": "read",
		"pages": "write",
		"id-token": "write"
	},
	"concurrency": {
		"group": "pages",
		"cancel-in-progress": true
	},
	"jobs": {
		"build": {
			"runs-on": "ubuntu-slim",
			"steps": [
				{
					"name": "Checkout",
					"uses": "actions/checkout@v6"
				},
				{
					"name": "Install Node.js",
					"uses": "actions/setup-node@v6",
					"with": {
						"node-version": "latest",
						"cache": "npm"
					},
				},
				{
					"name": "Install dependencies",
					"run": "npm ci"
				},
				{
					"name": "Build",
					"run": "npx vite build"
				},
				{
					"name": "Upload build artifact",
					"uses": "actions/upload-pages-artifact@v4",
					"with": {"path": "./dist"}
				}
			],
		},
		"deploy": {
			"needs": "build",
			"environment": {
				"name": "github-pages",
				"url": "${{steps.deployment.outputs.page_url}}"
			},
			"runs-on": "ubuntu-slim",
			"steps": [
				{
					"id": "deployment",
					"name": "Deploy to Pages",
					"uses": "actions/deploy-pages@v4"
				}
			]
		}
	}
}